services:
  localstack:
    image: localstack/localstack:3.7
    container_name: tech-challenge-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: lambda,apigateway,dynamodb,sqs,ses,sns,events,iam,logs,cloudwatch
      DEBUG: 1
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      LAMBDA_EXECUTOR: docker-reuse
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./infra/localstack:/etc/localstack/init/ready.d"
      - ".:/workspace"

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: tech-challenge-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      - localstack
