name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Build project
        run: mvn clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform -chdir=infra/terraform init

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -var-file=environments/dev.tfvars -var="ses_from_email=${{ secrets.SES_FROM_EMAIL }}" -var="report_recipient_email=${{ secrets.REPORT_RECIPIENT_EMAIL }}"

      - name: Terraform apply
        run: terraform -chdir=infra/terraform apply -auto-approve -var-file=environments/dev.tfvars -var="ses_from_email=${{ secrets.SES_FROM_EMAIL }}" -var="report_recipient_email=${{ secrets.REPORT_RECIPIENT_EMAIL }}"

      - name: Terraform outputs
        run: terraform -chdir=infra/terraform output
