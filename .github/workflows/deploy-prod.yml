name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_project_name: tech-challenge-fase-04
  TF_VAR_environment: prod
  TF_VAR_aws_region: us-east-1
  TF_VAR_dynamodb_table_name: avaliacoes-prod
  TF_VAR_email_queue_name: email-queue
  TF_VAR_email_dlq_name: email-queue-dlq
  TF_VAR_report_schedule_expression: "cron(0 12 ? * MON *)"
  AWS_ROLE_TO_ASSUME: arn:aws:iam::510997984143:role/tech-challenge-fase-04-github-deploy

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_ses_from_email: ${{ secrets.SES_FROM_EMAIL }}
      TF_VAR_report_recipient_email: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
      TF_VAR_admin_alert_email: ${{ secrets.ADMIN_ALERT_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required configuration
        run: |
          required_vars=(
            TF_STATE_BUCKET
            TF_VAR_ses_from_email
            TF_VAR_report_recipient_email
            TF_VAR_admin_alert_email
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required GitHub configuration: ${var_name}"
              exit 1
            fi
          done

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -B clean test

      - name: Package lambdas
        run: mvn -B package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check AWS identity and Terraform state access
        run: |
          aws sts get-caller-identity
          aws s3api head-bucket --bucket "${TF_STATE_BUCKET}"

          state_key="tech-challenge-fase-04/prod/terraform.tfstate"
          set +e
          head_output="$(aws s3api head-object --bucket "${TF_STATE_BUCKET}" --key "${state_key}" 2>&1)"
          head_status=$?
          set -e

          if [ "${head_status}" -eq 0 ]; then
            echo "Terraform state object is accessible: s3://${TF_STATE_BUCKET}/${state_key}"
          elif echo "${head_output}" | grep -Eq "(404|Not Found|NoSuchKey)"; then
            echo "Terraform state object does not exist yet; Terraform will create it."
          else
            echo "::error::Cannot read Terraform state object s3://${TF_STATE_BUCKET}/${state_key}."
            echo "::error::Check the inline policy on ${AWS_ROLE_TO_ASSUME}; it must allow s3:GetObject on this exact object prefix."
            echo "${head_output}"
            exit "${head_status}"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Create Terraform backend config
        working-directory: infra/terraform
        run: |
          cat > backend.github.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=tech-challenge-fase-04/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform format check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Terraform outputs
        working-directory: infra/terraform
        run: terraform output
